<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <div class="background">
  <body>
    <header>
      <h1>AI Beauty Quotes Generator🪷🥰</h1>
    </header>

    <main>
      <div class="form-container">
      <form id="quote-generator-form">
        <input
          type="text"
          placeholder="Enter beauty quotes type"
          autofocus
          required
          autocomplete="off"
          class="beauty-type"
          id="input-instructions"
        />
        <input type="submit" class="button" />
      </form>
      <div class="example">i.e: love, eyes or smile</div>
      </div>
      <div class="quote" id="quote">
      </div>
    </main>
    <footer>
      This AI project was coded by
      <a href="https://github.com/promisehanyani2-dotcom">Promise Hanyani</a>
      and is
      <a href="https://github.com/promisehanyani2-dotcom?tab=repositories"
        >open-sourced on GitHub</a
      >. Hosted on
      <a href="https://ai-beauty-quotes-generator.netlify.app/">Netlify</a>
    </footer>
    </div>
    <script src="index.js"></script>
  </body>
</html>
